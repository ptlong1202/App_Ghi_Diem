<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BadmintonPro">

    <title>🏸 Badminton Pro Scoreboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --gray: #8E8E93;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body { display: flex; justify-content: center; }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .safe-top { height: calc(env(safe-area-inset-top) + 10px); min-height: 50px; flex-shrink: 0; }

        .scroll-content {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 16px 120px 16px;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(242, 242, 247, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 0;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .btn-glass {
            background: var(--card);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .privacy-pill {
            background: #E3E3E8;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            border: none;
            outline: none;
            cursor: pointer;
            user-select: none;
            color: var(--text);
            transition: all 0.2s;
        }

        .privacy-active { background: #1C1C1E; color: white; }

        .pro-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .table-wrapper {
            background: var(--card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-scroll { width: 100%; overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }

        thead th {
            background: #F9F9FB;
            padding: 15px 8px;
            font-size: 10px;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
        
        thead th:active { background: #ECECED; }

        .total-row td {
            padding: 15px 8px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
            border-bottom: 2px solid #F2F2F7;
        }

        tbody td {
            padding: 14px 8px;
            text-align: center;
            font-weight: 600;
            border-top: 1px solid #F2F2F7;
            font-size: 15px;
        }
        
        tbody tr { cursor: pointer; }

        .score-badge {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 14px;
            display: inline-block;
            min-width: 35px;
        }

        .win { background: #E8F9EE; color: var(--success); }
        .lose { background: #FFF0F0; color: var(--danger); }

        /* --- TRICK SHOT & DOUBLE TRICK SHOT --- */
        .score-trick { color: #A020F0 !important; font-weight: 900 !important; border: 1.5px solid #A020F0; }

        .score-double-trick {
            background: linear-gradient(135deg, #A020F0, #6A0DAD) !important;
            color: #FFFFFF !important;
            font-weight: 900 !important;
            border: 2px solid #00d2ff !important;
            box-shadow: 0 0 10px rgba(160, 32, 240, 0.5), inset 0 0 5px #00d2ff;
            animation: double-trick-pulse 1s infinite alternate;
        }

        @keyframes double-trick-pulse {
            from { transform: scale(1); box-shadow: 0 0 10px rgba(160, 32, 240, 0.5); }
            to { transform: scale(1.1); box-shadow: 0 0 18px rgba(0, 210, 255, 0.8); }
        }

        /* --- JUMP SMASH --- */
        .score-jump {
            border: 2px solid transparent !important;
            background: 
                linear-gradient(135deg, #0f2027, #203a43, #2c5364) padding-box, 
                linear-gradient(135deg, #7a7a7a, #fdfdfd, #8e8e93, #ffffff, #7a7a7a) border-box !important;
            background-size: 200% 200% !important;
            color: #00d2ff !important;
            font-weight: 900 !important;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.2);
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
            animation: silver-shine 3s linear infinite !important;
        }

        @keyframes silver-shine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* --- RỒNG --- */
        .score-dragon {
            background: linear-gradient(135deg, #FFD700, #FFFACD, #FFD700) !important; 
            color: #000 !important; 
            border: 2px solid #B8860B !important; 
            font-weight: 900 !important; 
            box-shadow: 0 0 15px #FFD700, inset 0 0 5px #FFFFFF; 
            animation: dragon-vip 0.8s ease-in-out infinite alternate; 
            position: relative; transform: scale(1.1);
        }

        @keyframes dragon-vip { from { transform: scale(1.05); box-shadow: 0 0 10px #FFD700; } to { transform: scale(1.2); box-shadow: 0 0 25px #FFD700; } }

        /* --- OVERLAYS --- */
        #jackpotOverlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.4s; backdrop-filter: blur(5px); }
        #jackpotOverlay.show { opacity: 1; }

        #jackpotMsg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: auto; min-width: 280px; max-width: 90%; background: linear-gradient(135deg, #141e30, #243b55); color: #00d2ff; padding: 40px 30px; border-radius: 35px; font-size: 32px; font-weight: 900; text-align: center; z-index: 9999; border: 4px solid #fdfdfd; box-shadow: 0 0 100px rgba(0, 210, 255, 0.4); pointer-events: none; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); white-space: nowrap;
        }
        #jackpotMsg.show { transform: translate(-50%, -50%) scale(1); animation: pulseGlow 1.5s infinite alternate; }

        #dragonEntity { position: fixed; top: 50%; left: 50%; font-size: 120px; z-index: 10000; pointer-events: none; display: none; filter: drop-shadow(0 0 30px gold); transform: translate(-50%, -50%); }

        @keyframes dragonCircle { 0% { transform: translate(-50%, -50%) rotate(0deg) translateX(120px) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg) translateX(120px) rotate(-360deg); } }

        @keyframes pulseGlow { from { box-shadow: 0 0 40px rgba(0, 210, 255, 0.3); transform: translate(-50%, -50%) scale(1); } to { box-shadow: 0 0 80px rgba(0, 210, 255, 0.5); transform: translate(-50%, -50%) scale(1.05); } }

        .shake-ani { animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        .ultra-shake { animation: ultraShake 0.1s infinite; }
        @keyframes ultraShake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, 3px); } }

        .fab {
            position: absolute; bottom: calc(env(safe-area-inset-bottom) + 20px); left: 50%; transform: translateX(-50%); width: 68px; height: 68px; background: linear-gradient(135deg, var(--primary), #0056b3); color: white; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; box-shadow: 0 10px 25px rgba(0, 122, 255, 0.4); z-index: 100; cursor: pointer;
        }

        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); display: none; align-items: flex-end; z-index: 2000; backdrop-filter: blur(8px); }

        .modal-sheet { background: var(--card); width: 100%; max-width: 500px; margin: 0 auto; border-radius: 30px 30px 0 0; padding: 25px 20px calc(env(safe-area-inset-bottom) + 30px) 20px; }

        input { width: 100%; padding: 16px; border-radius: var(--radius-md); border: 2px solid #F2F2F7; background: #F9F9FB; font-size: 16px; margin-bottom: 12px; outline: none; }

        .btn-main { width: 100%; padding: 18px; border-radius: var(--radius-md); border: none; background: var(--primary); color: white; font-weight: 700; font-size: 16px; cursor: pointer; }

        .streak-fire { display: inline-block; animation: burn 0.5s infinite alternate; color: var(--warning); font-weight: 800; }
        @keyframes burn { from { transform: scale(1); } to { transform: scale(1.2); } }

        .page { display: none; animation: pageIn 0.3s ease-out; }
        .active-page { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: #F9F9FB; padding: 12px; border-radius: 12px; border: 1px solid #F2F2F7; }
        .stat-label { font-size: 11px; color: var(--gray); margin-bottom: 4px; display: block; }
        .stat-value { font-size: 18px; font-weight: 800; color: var(--text); }
    </style>
</head>

<body>

    <div id="jackpotOverlay"></div>
    <div id="dragonEntity">🐉</div>
    <div id="jackpotMsg">
        <div id="effTitle">⚡ JUMP SMASH ⚡</div>
        <span id="effSub">POWERFUL SHOT!</span>
    </div>

    <div class="app-container">
        <div class="safe-top"></div>

        <div class="scroll-content" id="mainScroll">
            <div id="pLobby" class="page active-page">
                <div style="margin-bottom: 25px;">
                    <p style="font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 1.5px; margin-bottom: 5px;">PREMIUM SCOREBOARD</p>
                    <h1 style="font-size: 28px; letter-spacing: -0.5px;">🏸 Badminton Pro</h1>
                </div>
                <div id="listTables"></div>
                <button id="addTableBtn" class="btn-main" style="margin-top: 10px;">+ Khởi tạo sân mới</button>
            </div>

            <div id="pGame" class="page">
                <div class="nav-bar">
                    <button id="backBtn" class="btn-glass">←</button>
                    <button id="privacyBtn" class="privacy-pill">
                        <span id="pStatusIcon">🔓</span> <span id="pStatusText">Công khai</span>
                    </button>
                    <div id="roundLabel" style="font-weight: 800; font-size: 11px; background: #1c1c1e; color: white; padding: 4px 10px; border-radius: 8px;">VÁN 0</div>
                </div>
                <h2 id="tableName" style="margin-bottom: 15px; font-size: 24px;">Tên sân</h2>
                <div class="table-wrapper">
                    <div class="table-scroll">
                        <table>
                            <thead id="hHead"></thead>
                            <tr id="hTotal" class="total-row"></tr>
                            <tbody id="hBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <button id="addRoundBtn" class="fab" style="display:none;">+</button>

        <div id="mCreate" class="modal">
            <div class="modal-sheet">
                <h2 style="margin-bottom: 20px;">Cài đặt sân đấu</h2>
                <input type="text" id="inTableName" placeholder="Tên sân (VD: Sân THVL)">
                <div id="inPlayers">
                    <input type="text" class="p-name-in" placeholder="Tên người chơi 1">
                    <input type="text" class="p-name-in" placeholder="Tên người chơi 2">
                </div>
                <button id="addPField" style="background: none; border: none; color: var(--primary); font-weight: 700; margin-bottom: 20px; font-size: 14px; cursor: pointer;">+ Thêm thành viên</button>
                <button id="confirmTable" class="btn-main">Bắt đầu trận đấu</button>
                <button class="close-m" style="width:100%; background: none; border: none; color: var(--gray); margin-top: 15px; cursor: pointer; padding: 10px;">Hủy bỏ</button>
            </div>
        </div>

        <div id="mScore" class="modal">
            <div class="modal-sheet">
                <h2 id="scoreTitle" style="text-align: center; margin-bottom: 20px;">Ghi điểm</h2>
                <div id="scoreInputs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
                <p style="font-size: 11px; color: var(--gray); text-align: center; margin: 15px 0;">* Người thắng để trống, người thua nhập số âm hoặc dương tùy ý.</p>
                <button id="saveScore" class="btn-main" style="background: var(--success);">Lưu kết quả</button>
                <button id="delRound" class="btn-main" style="background: var(--danger); display: none; margin-top: 10px;">Xóa ván đấu</button>
                <button class="close-m" style="width:100%; background: none; border: none; color: var(--gray); margin-top: 15px; cursor: pointer; padding: 10px;">Đóng</button>
            </div>
        </div>

        <div id="mStats" class="modal">
            <div class="modal-sheet">
                <h2 id="statsPlayerName" style="text-align: center; margin-bottom: 5px;">Tên người chơi</h2>
                <p style="text-align: center; font-size: 12px; color: var(--gray); margin-bottom: 15px;">Thống kê chi tiết cá nhân</p>
                <div class="stats-grid" id="statsContent"></div>
                <button class="close-m" style="width:100%; background: var(--bg); border: none; color: var(--text); margin-top: 20px; cursor: pointer; padding: 15px; border-radius: 12px; font-weight: 700;">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        let appData = JSON.parse(localStorage.getItem('pro_badminton_final')) || [];
        let curId = null, editIdx = -1, isMasked = false;

        const save = () => localStorage.setItem('pro_badminton_final', JSON.stringify(appData));

        const route = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('addRoundBtn').style.display = (id === 'pGame') ? 'flex' : 'none';
        };

        const hideModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');

        const renderLobby = () => {
            const list = document.getElementById('listTables');
            if (appData.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:50px 0;">🏸<p style="color:gray;">Chưa có dữ liệu sân đấu</p></div>`;
            } else {
                list.innerHTML = appData.map(t => `
                <div class="pro-card" onclick="enterTable('${t.id}')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight:800; font-size:18px;">${t.name}</div>
                            <div style="color:var(--gray); font-size:12px;">👤 ${t.players.length} người • 🏸 ${t.history.length} hiệp</div>
                        </div>
                        <div style="color:var(--danger); font-size:24px; padding:10px" onclick="removeTable(event, '${t.id}')">×</div>
                    </div>
                </div>`).join('');
            }
        };

        const enterTable = (id) => { curId = id; route('pGame'); renderGame(); };
        const removeTable = (e, id) => { e.stopPropagation(); if (confirm("Xóa sân này?")) { appData = appData.filter(x => x.id !== id); save(); renderLobby(); } };

        const getStreaks = (history) => {
            if (!history.length) return [];
            let numP = history[0].length, streaks = new Array(numP).fill(0);
            for (let i = 0; i < numP; i++) {
                let count = 0;
                for (let j = history.length - 1; j >= 0; j--) { if (history[j][i] > 0) count++; else break; }
                streaks[i] = count;
            }
            return streaks;
        };

        const renderGame = () => {
            const t = appData.find(x => x.id === curId);
            if (!t) return;
            document.getElementById('tableName').innerText = t.name;
            document.getElementById('roundLabel').innerText = `VÁN ${t.history.length}`;
            document.getElementById('hHead').innerHTML = `<tr><th>Hiệp</th>` + t.players.map((p, i) => `<th onclick="showPlayerStats(${i})">${p}</th>`).join('') + `</tr>`;

            let sums = new Array(t.players.length).fill(0);
            t.history.forEach(r => r.forEach((s, i) => sums[i] += s));
            const streaks = getStreaks(t.history);
            let maxS = Math.max(...sums), minS = Math.min(...sums), hasData = t.history.length > 0;

            document.getElementById('hTotal').innerHTML = `<td style="font-size: 11px; color: var(--gray); font-weight: normal; vertical-align: bottom;">TỔNG</td>` + sums.map((s, i) => {
                let badge = "";
                if (hasData) {
                    if (streaks[i] >= 3) badge = `<span class="streak-fire">🔥${streaks[i]}</span>`;
                    else if (!isMasked && s === maxS && s > 0) badge = "👑";
                    else if (!isMasked && s === minS && s < 0) badge = "🐟";
                }
                return `<td><div style="font-size:10px; height:12px;">${badge}</div>${isMasked ? '•••' : s}</td>`;
            }).join('');

            document.getElementById('hBody').innerHTML = [...t.history].reverse().map((r, i) => {
                let idx = t.history.length - 1 - i;
                const winPoint = Math.max(...r);
                const is4 = r.length === 4;

                return `<tr onclick="openScore(${idx})"><td>${idx + 1}</td>${r.map(s => {
                    let effectClass = "";
                    if (is4 && s === winPoint && s > 0) {
                        if (s === 120 && r.filter(x => x === -40).length === 3) effectClass = "score-dragon";
                        else if (s === 60 && r.filter(x => x === -20).length === 3) effectClass = "score-jump";
                        else if (s === 40 && r.filter(x => x === -40).length === 1 && r.filter(x => x === 0).length === 2) effectClass = "score-double-trick";
                        else if (s === 20 && r.filter(x => x === -20).length === 1 && r.filter(x => x === 0).length === 2) effectClass = "score-trick";
                    }
                    return `<td><span class="score-badge ${s > 0 ? 'win' : 'lose'} ${effectClass}">${s}</span></td>`;
                }).join('')}</tr>`;
            }).join('');
        };

        const showPlayerStats = (pIdx) => {
            const t = appData.find(x => x.id === curId);
            if (!t || t.history.length === 0) return alert("Chưa có dữ liệu hiệp đấu nào!");

            let wins = 0, totalScore = 0, maxWinS = 0, maxLoseS = 0, currentWinS = 0, currentLoseS = 0;
            let trick = 0, jump = 0, dragon = 0;
            const is4 = t.players.length === 4;

            t.history.forEach(r => {
                const s = r[pIdx];
                totalScore += s;
                const winPoint = Math.max(...r);
                
                if (s > 0) {
                    wins++; currentWinS++; currentLoseS = 0;
                    if (currentWinS > maxWinS) maxWinS = currentWinS;
                    if (is4 && s === winPoint) {
                        if (s === 120 && r.filter(x => x === -40).length === 3) dragon++;
                        else if (s === 60 && r.filter(x => x === -20).length === 3) jump++;
                        else if ((s === 20 && r.filter(x => x === -20).length === 1 && r.filter(x => x === 0).length === 2) || 
                                 (s === 40 && r.filter(x => x === -40).length === 1 && r.filter(x => x === 0).length === 2)) trick++;
                    }
                } else if (s < 0) {
                    currentLoseS++; currentWinS = 0;
                    if (currentLoseS > maxLoseS) maxLoseS = currentLoseS;
                } else {
                    currentWinS = 0; currentLoseS = 0;
                }
            });

            const avg = (totalScore / t.history.length).toFixed(1);

            document.getElementById('statsPlayerName').innerText = t.players[pIdx];
            document.getElementById('statsContent').innerHTML = `
                <div class="stat-item"><span class="stat-label">Thắng</span><div class="stat-value">${wins} hiệp</div></div>
                <div class="stat-item"><span class="stat-label">Điểm TB</span><div class="stat-value">${avg}</div></div>
                <div class="stat-item"><span class="stat-label">Chuỗi thắng Max</span><div class="stat-value">${maxWinS}</div></div>
                <div class="stat-item"><span class="stat-label">Chuỗi thua Max</span><div class="stat-value">${maxLoseS}</div></div>
                <div class="stat-item"><span class="stat-label">Trick Shot</span><div class="stat-value">${trick}</div></div>
                <div class="stat-item"><span class="stat-label">Jump Smash</span><div class="stat-value">${jump}</div></div>
                <div class="stat-item" style="grid-column: span 2;"><span class="stat-label">Số lần Hóa Rồng</span><div class="stat-value">🐉 ${dragon}</div></div>
            `;
            document.getElementById('mStats').style.display = 'flex';
        };

        const openScore = (idx = -1) => {
            editIdx = idx; 
            const t = appData.find(x => x.id === curId);
            document.getElementById('scoreInputs').innerHTML = t.players.map((p, i) => {
                let val = "";
                if (idx >= 0) {
                    if (t.history[idx][i] === Math.max(...t.history[idx])) val = "";
                    else val = t.history[idx][i];
                }
                return `<div><label style="font-size:11px; font-weight:700; color:gray;">${p}</label>
                        <input type="number" class="score-v" data-idx="${i}" value="${val}"></div>`;
            }).join('');
            document.getElementById('scoreTitle').innerText = idx >= 0 ? "Sửa hiệp " + (idx + 1) : "Ghi điểm mới";
            document.getElementById('delRound').style.display = idx >= 0 ? 'block' : 'none';
            document.getElementById('mScore').style.display = 'flex';
        };

        document.getElementById('saveScore').onclick = () => {
            const t = appData.find(x => x.id === curId);
            const inps = document.querySelectorAll('.score-v');
            let scores = new Array(t.players.length).fill(null);
            let winI = -1, emp = 0, sumOthers = 0;

            inps.forEach(inp => {
                let i = parseInt(inp.dataset.idx);
                if (inp.value === "") { emp++; winI = i; } 
                else { let val = parseInt(inp.value) || 0; scores[i] = val; sumOthers += val; }
            });

            if (emp !== 1) return alert("Chỉ để trống 1 người thắng");
            scores[winI] = -sumOthers;
            const winnerPoint = scores[winI];

            const is4 = t.players.length === 4;
            const isJump = is4 && winnerPoint === 60 && scores.filter(s => s === -20).length === 3;
            const isDragon = is4 && winnerPoint === 120 && scores.filter(s => s === -40).length === 3;
            const isDoubleTrick = is4 && winnerPoint === 40 && scores.filter(s => s === -40).length === 1 && scores.filter(s => s === 0).length === 2;
            const isTrick = is4 && winnerPoint === 20 && scores.filter(s => s === -20).length === 1 && scores.filter(s => s === 0).length === 2;

            if (isJump || isDragon || isTrick || isDoubleTrick) {
                document.body.classList.add(isDragon ? 'ultra-shake' : 'shake-ani');
                const msg = document.getElementById('jackpotMsg');
                const overlay = document.getElementById('jackpotOverlay');
                const dragonE = document.getElementById('dragonEntity');
                
                if (isDragon) { 
                    msg.children[0].innerText = "🐉 RỒNG 🐉"; msg.children[1].innerText = "💀 UNSTOPPABLE"; 
                    msg.style.background = "linear-gradient(135deg, #FFD700, #FFFACD, #FFD700)";
                    msg.style.color = "#1c1c1e";
                    dragonE.style.display = 'block'; dragonE.style.animation = "dragonCircle 2.5s linear infinite";
                } else if (isJump) {
                    msg.children[0].innerText = "⚡ JUMP SMASH ⚡"; msg.children[1].innerText = "💥💥💥";
                    msg.style.background = "linear-gradient(135deg, #141e30, #243b55)";
                    msg.style.color = "#00d2ff";
                } else if (isDoubleTrick) {
                    msg.children[0].innerText = "✨ DOUBLE TRICK ✨"; msg.children[1].innerText = "🎬CINEMATIC";
                    msg.style.background = "linear-gradient(135deg, #A020F0, #00d2ff)";
                    msg.style.color = "white";
                } else {
                    msg.children[0].innerText = "🏸 TRICK SHOT 🏸"; msg.children[1].innerText = "😏 GOTCHA";
                    msg.style.background = "linear-gradient(135deg, #A020F0, #E0B0FF, #A020F0)";
                    msg.style.color = "white";
                }
                
                msg.classList.add('show'); overlay.classList.add('show');
                setTimeout(() => { 
                    msg.classList.remove('show'); overlay.classList.remove('show'); 
                    dragonE.style.display = 'none'; document.body.classList.remove('ultra-shake', 'shake-ani');
                }, 4000);

                var end = Date.now() + 4000;
                (function frame() {
                    let colors = isDoubleTrick ? ['#A020F0', '#00d2ff', '#FFFFFF'] : (isDragon ? ['#FFD700', '#FFA500'] : ['#00d2ff', '#C0C0C0', '#FFFFFF']);
                    confetti({ particleCount: 15, angle: 60, spread: 60, origin: { x: 0, y: 0.6 }, colors: colors });
                    confetti({ particleCount: 15, angle: 120, spread: 60, origin: { x: 1, y: 0.6 }, colors: colors });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            } else { confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } }); }

            if (editIdx === -1) t.history.push(scores); else t.history[editIdx] = scores;
            save(); hideModals(); renderGame();
        };

        document.getElementById('privacyBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (isMasked && !confirm("Moment of truth... 🕵️‍♂️")) return; 
            isMasked = !isMasked;
            this.classList.toggle('privacy-active', isMasked);
            document.getElementById('pStatusIcon').innerText = isMasked ? "🔒" : "🔓";
            document.getElementById('pStatusText').innerText = isMasked ? "Đang ẩn" : "Công khai";
            renderGame();
        });

        document.getElementById('addTableBtn').onclick = () => { document.getElementById('mCreate').style.display = 'flex'; };
        document.getElementById('addPField').onclick = () => {
            const inp = document.createElement('input'); inp.className = 'p-name-in'; inp.placeholder = "Tên người chơi";
            document.getElementById('inPlayers').appendChild(inp);
        };
        document.getElementById('confirmTable').onclick = () => {
            const ps = [...document.querySelectorAll('.p-name-in')].map(i => i.value.trim()).filter(v => v);
            if (ps.length < 2) return alert("Cần ít nhất 2 người");
            const newT = { id: 't' + Date.now(), name: document.getElementById('inTableName').value || "Sân mới", players: ps, history: [] };
            appData.push(newT); save(); renderLobby(); hideModals(); enterTable(newT.id);
        };
        document.getElementById('addRoundBtn').onclick = () => openScore(-1);
        document.getElementById('backBtn').onclick = () => { route('pLobby'); renderLobby(); };
        document.querySelectorAll('.close-m').forEach(b => b.onclick = hideModals);
        document.getElementById('delRound').onclick = () => { if (confirm("Xóa hiệp này?")) { appData.find(x => x.id === curId).history.splice(editIdx, 1); save(); hideModals(); renderGame(); } };

        renderLobby();
    </script>
</body>
</html>
