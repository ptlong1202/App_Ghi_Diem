<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Badminton v9.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #007AFF; --success: #34C759; --danger: #FF3B30; --warning: #FF9500;
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --gray: #8E8E93;
            --radius-lg: 24px; --radius-md: 16px; --shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding-bottom: env(safe-area-inset-bottom); }

        /* UI ELEMENTS */
        .page { display: none; padding: 20px 16px; min-height: 100vh; animation: pageIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(242, 242, 247, 0.8); backdrop-filter: blur(20px); z-index: 1000; padding: 12px 0; }
        .btn-glass { background: var(--card); border: none; width: 42px; height: 42px; border-radius: 50%; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .privacy-pill { background: #E3E3E8; padding: 8px 16px; border-radius: 40px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .privacy-active { background: #1C1C1E; color: white; }

        /* TABLE STYLING */
        .table-wrapper { background: var(--card); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #F9F9FB; padding: 18px 8px; font-size: 10px; color: var(--gray); text-transform: uppercase; border-bottom: 1px solid #F2F2F7; }
        .total-row { background: #FFF; border-bottom: 3px solid var(--bg); }
        .total-row td { padding: 24px 8px; font-size: 20px; font-weight: 800; color: var(--primary); text-align: center; position: relative; }
        tbody td { padding: 16px 8px; text-align: center; border-bottom: 1px solid #F2F2F7; }

        /* BADGES */
        .score-badge { padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 14px; }
        .win { background: #E8F9EE; color: var(--success); }
        .lose { background: #FFF0F0; color: var(--danger); }
        .fire-badge { font-size: 11px; color: var(--warning); font-weight: 800; display: block; margin-top: 4px; }
        .rank-icon { position: absolute; top: 4px; right: 50%; transform: translateX(50%); font-size: 12px; }

        .fab { position: fixed; bottom: 34px; right: 24px; width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), #0056b3); color: white; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 28px; border: none; box-shadow: 0 12px 24px rgba(0,122,255,0.3); z-index: 100; }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: none; align-items: flex-end; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-sheet { background: var(--card); width: 100%; border-radius: 32px 32px 0 0; padding: 32px 24px; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input { width: 100%; padding: 16px; border-radius: var(--radius-md); border: 2px solid #F2F2F7; background: #F9F9FB; font-size: 18px; font-weight: 700; margin-bottom: 16px; outline: none; }
        input:focus { border-color: var(--primary); background: #FFF; }
        .btn-main { width: 100%; padding: 18px; border-radius: var(--radius-md); border: none; background: var(--text); color: white; font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>

    <div id="pLobby" class="page active-page">
        <div style="padding: 20px 0;">
            <p style="text-transform: uppercase; font-size: 11px; font-weight: 700; color: var(--primary); letter-spacing: 1px;">Badminton Executive</p>
            <h1>Sân Chơi Pro</h1>
        </div>
        <div id="listTables"></div>
        <button id="addTableBtn" class="btn-main" style="background: var(--primary); margin-top: 20px;">+ Tạo sân mới</button>
    </div>

    <div id="pGame" class="page">
        <div class="nav-bar">
            <button id="backBtn" class="btn-glass">←</button>
            <div id="privacyBtn" class="privacy-pill">
                <span id="pStatusIcon">🔓</span> <span id="pStatusText">Công khai</span>
            </div>
            <div id="roundLabel" style="font-weight: 800; font-size: 13px; color: var(--gray);">VÁN 0</div>
        </div>
        <h2 id="tableName" style="margin: 20px 0;">Tên Sân</h2>
        <div class="table-wrapper">
            <table>
                <thead id="hHead"></thead>
                <tr id="hTotal" class="total-row"></tr>
                <tbody id="hBody"></tbody>
            </table>
        </div>
        <button id="addRoundBtn" class="fab">+</button>
    </div>

    <div id="mScore" class="modal">
        <div class="modal-sheet">
            <h2 id="scoreTitle" style="text-align:center">Ghi điểm</h2>
            <div id="scoreInputs" style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-top:24px"></div>
            <p style="font-size:12px; color:var(--gray); text-align:center; margin:16px 0">
                Mẹo: Chỉ cần nhập số (ví dụ: 10), app sẽ tự hiểu là -10
            </p>
            <button id="saveScore" class="btn-main" style="background:var(--success)">Xác nhận ván</button>
            <button id="delRound" class="btn-main" style="background:var(--danger); display:none; margin-top:12px">Xóa ván</button>
            <button class="btn-main close-m" style="background:none; color:var(--gray); margin-top:8px">Đóng</button>
        </div>
    </div>

    <div id="mCreate" class="modal">
        <div class="modal-sheet">
            <h2>Cài đặt sân</h2>
            <input type="text" id="inTableName" placeholder="Tên sân" style="margin-top:20px">
            <div id="inPlayers">
                <input type="text" class="p-name-in" placeholder="Người chơi 1">
                <input type="text" class="p-name-in" placeholder="Người chơi 2">
            </div>
            <button id="addPField" style="background:none; border:none; color:var(--primary); font-weight:700; margin-bottom:20px">+ Thêm người</button>
            <button id="confirmTable" class="btn-main" style="background:var(--primary)">Bắt đầu</button>
            <button class="btn-main close-m" style="background:none; color:var(--gray); margin-top:8px">Hủy</button>
        </div>
    </div>

<script>
    let appData = JSON.parse(localStorage.getItem('pkr_v9_final')) || [];
    let curId = null, editIdx = -1, isMasked = false;

    const save = () => localStorage.setItem('pkr_v9_final', JSON.stringify(appData));
    const route = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
    };
    const hideModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); editIdx = -1; };

    const renderLobby = () => {
        const list = document.getElementById('listTables');
        list.innerHTML = appData.length === 0 ? `<div style="text-align:center; padding:40px; color:var(--gray)">Chưa có dữ liệu</div>` : 
            appData.map(t => `
                <div class="pro-card" onclick="enterTable('${t.id}')" style="background:white; padding:20px; border-radius:24px; margin-bottom:12px; box-shadow:var(--shadow)">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><div style="font-weight:800; font-size:18px">${t.name}</div><div style="color:var(--gray); font-size:12px">🎾 ${t.history.length} ván</div></div>
                        <div style="color:var(--danger)" onclick="removeTable(event, '${t.id}')">×</div>
                    </div>
                </div>`).join('');
    };

    const enterTable = (id) => { curId = id; route('pGame'); renderGame(); };
    const removeTable = (e, id) => { e.stopPropagation(); if(confirm("Xóa sân?")) { appData = appData.filter(x => x.id !== id); save(); renderLobby(); } };

    const renderGame = () => {
        const t = appData.find(x => x.id === curId);
        document.getElementById('tableName').innerText = t.name;
        document.getElementById('roundLabel').innerText = `VÁN ${t.history.length}`;
        
        // Win Streaks 🔥
        let streaks = new Array(t.players.length).fill(0);
        for (let i = 0; i < t.players.length; i++) {
            for (let j = t.history.length - 1; j >= 0; j--) {
                if (t.history[j][i] > 0) streaks[i]++; else break;
            }
        }

        document.getElementById('hHead').innerHTML = `<tr><th style="width:50px">Hiệp</th>` + 
            t.players.map((p, i) => `<th>${p}${streaks[i] >= 3 ? `<span class="fire-badge">🔥${streaks[i]}</span>` : ""}</th>`).join('') + `</tr>`;
        
        let sums = new Array(t.players.length).fill(0);
        t.history.forEach(r => r.forEach((s, i) => sums[i] += s));
        let maxS = Math.max(...sums), minS = Math.min(...sums);

        document.getElementById('hTotal').innerHTML = `<td>Σ</td>` + 
            sums.map((s, i) => {
                let badge = "";
                if (!isMasked && t.history.length > 0) {
                    if (s === maxS && s > 0) badge = `<span class="rank-icon">👑</span>`;
                    else if (s === minS && s < 0) badge = `<span class="rank-icon">🐟</span>`;
                }
                return `<td>${badge}${isMasked ? '<span class="mask-text">••••</span>' : s}</td>`;
            }).join('');

        const tbody = document.getElementById('hBody');
        tbody.innerHTML = [...t.history].reverse().map((r, i) => {
            let idx = t.history.length - 1 - i;
            return `<tr onclick="openScore(${idx})"><td style="color:var(--gray); font-size:11px">${idx+1}</td>${r.map(s => `<td><span class="score-badge ${s>0?'win':'lose'}">${s}</span></td>`).join('')}</tr>`;
        }).join('');
    };

    const openScore = (idx = -1) => {
        editIdx = idx;
        const t = appData.find(x => x.id === curId);
        const area = document.getElementById('scoreInputs');
        area.innerHTML = t.players.map((p, i) => {
            let val = (idx >= 0 && t.history[idx][i] <= 0) ? Math.abs(t.history[idx][i]) : "";
            // CHÌA KHÓA: type="text" + inputmode="numeric" để hiện phím số có dấu trừ trên iOS
            return `<div>
                <label style="font-size:10px; font-weight:800; color:var(--gray); display:block; margin-bottom:4px">${p.toUpperCase()}</label>
                <input type="text" inputmode="numeric" class="score-v" data-idx="${i}" value="${val}" placeholder="0" style="text-align:center">
            </div>`;
        }).join('');
        document.getElementById('scoreTitle').innerText = idx >= 0 ? "Sửa ván " + (idx+1) : "Ván mới";
        document.getElementById('delRound').style.display = idx >= 0 ? 'block' : 'none';
        document.getElementById('mScore').style.display = 'flex';
    };

    document.getElementById('saveScore').onclick = () => {
        const t = appData.find(x => x.id === curId);
        const inps = document.querySelectorAll('.score-v');
        let scores = new Array(t.players.length).fill(null), winI = -1, emp = 0;

        inps.forEach(inp => {
            let rawV = inp.value.trim();
            let v = rawV === "" ? null : parseInt(rawV);
            let i = parseInt(inp.dataset.idx);
            
            // Xử lý thông minh: Nếu nhập số dương (ví dụ 10) thì tự đổi thành số âm (-10)
            // vì đây là ô nhập điểm của người thua.
            if (v !== null && v > 0) v = -v;
            
            scores[i] = v; if(v === null) { emp++; winI = i; }
        });

        if(emp !== 1) return alert("Vui lòng để trống đúng 1 người thắng");
        scores[winI] = -scores.reduce((a, b) => a + (b || 0), 0);
        
        if(editIdx === -1) {
            t.history.push(scores);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        } else t.history[editIdx] = scores;
        
        save(); hideModals(); renderGame();
    };

    // Các sự kiện khác giữ nguyên
    document.getElementById('addTableBtn').onclick = () => {
        document.getElementById('inTableName').value = "";
        document.getElementById('inPlayers').innerHTML = `<input type="text" placeholder="Người 1"><input type="text" placeholder="Người 2">`;
        document.getElementById('mCreate').style.display = 'flex';
    };
    document.getElementById('addPField').onclick = () => {
        const inp = document.createElement('input'); inp.placeholder = "Người tiếp theo";
        document.getElementById('inPlayers').appendChild(inp);
    };
    document.getElementById('confirmTable').onclick = () => {
        const ps = [...document.querySelectorAll('#inPlayers input')].map(i => i.value.trim()).filter(v => v);
        if(ps.length < 2) return alert("Cần 2 người");
        const newT = { id: 't_'+Date.now(), name: document.getElementById('inTableName').value || "Sân mới", players: ps, history: [] };
        appData.push(newT); save(); renderLobby(); hideModals(); enterTable(newT.id);
    };
    document.getElementById('privacyBtn').onclick = function() {
        isMasked = !isMasked;
        this.classList.toggle('privacy-active', isMasked);
        document.getElementById('pStatusIcon').innerText = isMasked ? "🔒" : "🔓";
        renderGame();
    };
    document.getElementById('backBtn').onclick = () => { route('pLobby'); renderLobby(); };
    document.getElementById('addRoundBtn').onclick = () => openScore(-1);
    document.getElementById('delRound').onclick = () => { if(confirm("Xóa?")) { appData.find(x=>x.id===curId).history.splice(editIdx,1); save(); hideModals(); renderGame(); } };
    document.querySelectorAll('.close-m').forEach(b => b.onclick = hideModals);
    renderLobby();
</script>
</body>
</html>
