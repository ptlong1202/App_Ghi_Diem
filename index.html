<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BadmintonPro">

    <title>🏸 Badminton Pro Scoreboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --primary: #007AFF; --success: #34C759; --danger: #FF3B30; --warning: #FF9500;
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --gray: #8E8E93;
            --radius-lg: 24px; --radius-md: 16px; --shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 500px; 
            height: 100dvh;
            display: flex; flex-direction: column;
            position: relative;
        }

        .safe-top {
            height: calc(env(safe-area-inset-top) + 10px);
            min-height: 50px;
            background: var(--bg);
            flex-shrink: 0;
        }

        .scroll-content {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 16px 120px 16px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            text-align: center;
            color: var(--text);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .page { display: none; animation: pageIn 0.3s ease-out; }
        .active-page { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(242, 242, 247, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            padding: 10px 0; margin-bottom: 15px;
            position: sticky; top: 0; z-index: 999;
        }

        .btn-glass {
            background: var(--card); border: none; width: 40px; height: 40px;
            border-radius: 50%; box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }

        .privacy-pill { 
            background: #E3E3E8; padding: 8px 14px; border-radius: 40px; 
            font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px;
        }
        .privacy-active { background: #1C1C1E; color: white; }

        .pro-card {
            background: var(--card); border-radius: var(--radius-lg); padding: 20px;
            margin-bottom: 16px; box-shadow: var(--shadow);
        }

        .table-wrapper { 
            background: var(--card); border-radius: var(--radius-lg); 
            box-shadow: var(--shadow); width: 100%; overflow: hidden;
        }
        .table-scroll { width: 100%; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #F9F9FB; padding: 15px 8px; font-size: 10px; color: var(--gray); text-transform: uppercase; }
        
        .total-row td:first-child { font-size: 11px; font-weight: 800; color: var(--gray); }
        .total-row td { padding: 15px 8px; font-size: 20px; font-weight: 800; color: var(--primary); text-align: center; }
        
        tbody td { padding: 14px 8px; text-align: center; font-weight: 600; border-top: 1px solid #F2F2F7; }

        .score-badge { padding: 5px 10px; border-radius: 8px; font-size: 14px; }
        .win { background: #E8F9EE; color: var(--success); }
        .lose { background: #FFF0F0; color: var(--danger); }

        .streak-fire {
            display: inline-block;
            animation: burn 0.5s infinite alternate;
        }
        @keyframes burn { from { transform: scale(1); filter: drop-shadow(0 0 2px orange); } to { transform: scale(1.2); filter: drop-shadow(0 0 5px red); } }

        .fab {
            position: absolute; bottom: calc(env(safe-area-inset-bottom) + 20px); 
            left: 50%; transform: translateX(-50%);
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--primary), #0056b3);
            color: white; border-radius: 22px; display: flex; align-items: center;
            justify-content: center; font-size: 28px; border: none;
            box-shadow: 0 10px 25px rgba(0,122,255,0.4); z-index: 100;
        }

        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            display: none; align-items: flex-end; z-index: 2000; backdrop-filter: blur(8px); 
        }
        .modal-sheet { 
            background: var(--card); width: 100%; max-width: 500px; margin: 0 auto;
            border-radius: 30px 30px 0 0; padding: 25px 20px calc(env(safe-area-inset-bottom) + 30px) 20px; 
        }

        input { 
            width: 100%; padding: 16px; border-radius: var(--radius-md); border: 2px solid #F2F2F7;
            background: #F9F9FB; font-size: 16px; margin-bottom: 15px; outline: none;
        }

        .btn-main {
            width: 100%; padding: 18px; border-radius: var(--radius-md); border: none;
            background: var(--primary); color: white; font-weight: 700; font-size: 16px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="safe-top"></div>

    <div class="scroll-content" id="mainScroll">
        <div id="pLobby" class="page active-page">
            <div style="margin-bottom: 25px;">
                <p style="font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 1.5px; margin-bottom: 5px;">PREMIUM SCOREBOARD</p>
                <h1 style="font-size: 26px;">🏆 Badminton Pro</h1>
            </div>
            <div id="listTables"></div>
            <button id="addTableBtn" class="btn-main" style="margin-top: 10px;">+ Khởi tạo sân mới</button>
        </div>

        <div id="pGame" class="page">
            <div class="nav-bar">
                <button id="backBtn" class="btn-glass">←</button>
                <div id="privacyBtn" class="privacy-pill">
                    <span id="pStatusIcon">🔓</span> <span id="pStatusText">Công khai</span>
                </div>
                <div id="roundLabel" style="font-weight: 800; font-size: 11px; background: #1c1c1e; color: white; padding: 4px 10px; border-radius: 8px;">VÁN 0</div>
            </div>

            <h2 id="tableName" style="margin-bottom: 15px; font-size: 22px;">Sân THVL</h2>

            <div class="table-wrapper">
                <div class="table-scroll">
                    <table>
                        <thead id="hHead"></thead>
                        <tr id="hTotal" class="total-row"></tr>
                        <tbody id="hBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <button id="addRoundBtn" class="fab" style="display:none;">+</button>

    <div id="mCreate" class="modal">
        <div class="modal-sheet">
            <h2 style="margin-bottom: 20px;">Cài đặt sân đấu</h2>
            <input type="text" id="inTableName" placeholder="Tên sân (VD: Sân THVL)">
            <div id="inPlayers">
                <input type="text" class="p-name-in" placeholder="Tên người chơi 1">
                <input type="text" class="p-name-in" placeholder="Tên người chơi 2">
            </div>
            <button id="addPField" style="background: none; border: none; color: var(--primary); font-weight: 700; margin-bottom: 20px; font-size: 14px;">+ Thêm thành viên</button>
            <button id="confirmTable" class="btn-main">Bắt đầu trận đấu</button>
            <button class="close-m" style="width:100%; background: none; border: none; color: var(--gray); margin-top: 15px;">Hủy bỏ</button>
        </div>
    </div>

    <div id="mScore" class="modal">
        <div class="modal-sheet">
            <h2 id="scoreTitle" style="text-align: center; margin-bottom: 20px;">Ghi điểm hiệp mới</h2>
            <div id="scoreInputs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
            <p style="font-size: 11px; color: var(--gray); text-align: center; margin: 15px 0;">* Người thắng để trống điểm để tự động tính</p>
            <button id="saveScore" class="btn-main" style="background: var(--success);">Lưu kết quả</button>
            <button id="delRound" class="btn-main" style="background: var(--danger); display: none; margin-top: 10px;">Xóa ván đấu</button>
            <button class="close-m" style="width:100%; background: none; border: none; color: var(--gray); margin-top: 15px;">Đóng</button>
        </div>
    </div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('pro_badminton_v10')) || [];
    let curId = null, editIdx = -1, isMasked = false;

    const save = () => localStorage.setItem('pro_badminton_v10', JSON.stringify(appData));
    
    const route = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.getElementById('addRoundBtn').style.display = (id === 'pGame') ? 'flex' : 'none';
        document.getElementById('mainScroll').scrollTo(0,0);
        window.scrollTo(0,0);
    };

    const hideModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };

    const renderLobby = () => {
        const list = document.getElementById('listTables');
        if (appData.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 80px; margin-bottom: 10px;">🏸</div>
                    <p style="font-weight: 600; line-height: 1.5;">
                        Chưa có trận đấu nào.<br>
                        <span style="font-weight: 400; opacity: 0.6; font-size: 14px;">Hãy tạo sân để bắt đầu ghi điểm!</span>
                    </p>
                </div>`;
        } else {
            list.innerHTML = appData.map(t => `
                <div class="pro-card" onclick="enterTable('${t.id}')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight:800; font-size:18px;">${t.name}</div>
                            <div style="color:var(--gray); font-size:12px;">👤 ${t.players.length} người • 🏸 ${t.history.length} hiệp</div>
                        </div>
                        <div style="color:var(--danger); font-size:22px; padding:5px" onclick="removeTable(event, '${t.id}')">×</div>
                    </div>
                </div>
            `).join('');
        }
    };

    const enterTable = (id) => { curId = id; route('pGame'); renderGame(); };
    const removeTable = (e, id) => { e.stopPropagation(); if(confirm("Xóa sân?")) { appData = appData.filter(x => x.id !== id); save(); renderLobby(); }};

    const getStreaks = (history) => {
        if (history.length === 0) return [];
        let numPlayers = history[0].length;
        let streaks = new Array(numPlayers).fill(0);
        for (let i = 0; i < numPlayers; i++) {
            let count = 0;
            for (let j = history.length - 1; j >= 0; j--) {
                if (history[j][i] > 0) count++;
                else break;
            }
            streaks[i] = count;
        }
        return streaks;
    };

    const renderGame = () => {
        const t = appData.find(x => x.id === curId);
        if(!t) return;
        document.getElementById('tableName').innerText = t.name;
        document.getElementById('roundLabel').innerText = `VÁN ${t.history.length}`;

        document.getElementById('hHead').innerHTML = `<tr><th>Hiệp</th>` + t.players.map(p => `<th>${p}</th>`).join('') + `</tr>`;
        
        let sums = new Array(t.players.length).fill(0);
        t.history.forEach(r => r.forEach((s, i) => sums[i] += s));
        
        const streaks = getStreaks(t.history);
        let maxS = Math.max(...sums), minS = Math.min(...sums), hasData = t.history.length > 0;

        document.getElementById('hTotal').innerHTML = `<td>TỔNG</td>` + sums.map((s, i) => {
            let badge = "";
            if(!isMasked && hasData) {
                if(streaks[i] >= 3) badge = `<span class="streak-fire">🔥${streaks[i]}</span>`;
                else if(s === maxS && s > 0) badge = "👑";
                else if(s === minS && s < 0) badge = "🐟";
            }
            return `<td><div style="font-size:12px; height: 16px;">${badge}</div>${isMasked ? '•••' : s}</td>`;
        }).join('');

        document.getElementById('hBody').innerHTML = [...t.history].reverse().map((r, i) => {
            let idx = t.history.length - 1 - i;
            return `<tr onclick="openScore(${idx})"><td>${idx+1}</td>${r.map(s => `<td><span class="score-badge ${s>0?'win':'lose'}">${s}</span></td>`).join('')}</tr>`;
        }).join('');
    };

    document.getElementById('addTableBtn').onclick = () => { document.getElementById('mCreate').style.display = 'flex'; };
    document.getElementById('addPField').onclick = () => {
        const inp = document.createElement('input'); inp.className = 'p-name-in'; inp.placeholder = "Tên người chơi tiếp theo";
        document.getElementById('inPlayers').appendChild(inp);
    };

    document.getElementById('confirmTable').onclick = () => {
        const ps = [...document.querySelectorAll('.p-name-in')].map(i => i.value.trim()).filter(v => v);
        if(ps.length < 2) return alert("Cần ít nhất 2 người");
        const newT = { id: 't'+Date.now(), name: document.getElementById('inTableName').value || "Sân mới", players: ps, history: [] };
        appData.push(newT); save(); renderLobby(); hideModals(); enterTable(newT.id);
    };

    // FIX BÀN PHÍM TẠI ĐÂY: Dùng type="text" và inputmode="numeric"
    const openScore = (idx = -1) => {
        editIdx = idx; const t = appData.find(x => x.id === curId);
        document.getElementById('scoreInputs').innerHTML = t.players.map((p, i) => {
            let val = (idx >= 0 && t.history[idx][i] <= 0) ? t.history[idx][i] : "";
            return `<div><label style="font-size:12px; font-weight:700; color:gray;">${p}</label><input type="text" inputmode="numeric" class="score-v" data-idx="${i}" value="${val}"></div>`;
        }).join('');
        document.getElementById('scoreTitle').innerText = idx >= 0 ? "Sửa hiệp " + (idx+1) : "Ghi điểm hiệp mới";
        document.getElementById('delRound').style.display = idx >= 0 ? 'block' : 'none';
        document.getElementById('mScore').style.display = 'flex';
    };

    document.getElementById('addRoundBtn').onclick = () => openScore(-1);

    document.getElementById('saveScore').onclick = () => {
        const t = appData.find(x => x.id === curId);
        const inps = document.querySelectorAll('.score-v');
        let scores = new Array(t.players.length).fill(null), winI = -1, emp = 0;
        inps.forEach(inp => {
            let v = (inp.value === "") ? null : parseInt(inp.value);
            let i = parseInt(inp.dataset.idx);
            scores[i] = v; if(v === null) { emp++; winI = i; }
        });
        if(emp !== 1) return alert("Phải có duy nhất 1 người thắng (để trống)");
        scores[winI] = -scores.reduce((a, b) => a + (b || 0), 0);
        
        if(editIdx === -1) { 
            t.history.push(scores); 
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } }); 
        } else {
            t.history[editIdx] = scores;
        }
        
        save(); hideModals(); renderGame();
    };

    document.getElementById('privacyBtn').onclick = function() {
        isMasked = !isMasked;
        this.classList.toggle('privacy-active', isMasked);
        document.getElementById('pStatusIcon').innerText = isMasked ? "🔒" : "🔓";
        document.getElementById('pStatusText').innerText = isMasked ? "Đang ẩn" : "Công khai";
        renderGame();
    };

    document.getElementById('backBtn').onclick = () => { route('pLobby'); renderLobby(); };
    document.querySelectorAll('.close-m').forEach(b => b.onclick = hideModals);
    document.getElementById('delRound').onclick = () => { if(confirm("Xóa hiệp?")) { appData.find(x => x.id === curId).history.splice(editIdx, 1); save(); hideModals(); renderGame(); }};
    
    renderLobby();
</script>
</body>
</html>
